<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        
        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">OpenClaw AI</h1>
                <button id="close-sidebar-btn" class="close-sidebar-btn d-md-none" aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div class="sidebar-content">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>New Chat</span>
                </button>

                <div class="upload-section">
                    <label for="file-input" class="upload-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        <span>Upload Document</span>
                    </label>
                    <input type="file" id="file-input" accept=".txt,.pdf,.docx" style="display: none;" />
                    <div id="upload-status" class="upload-status"></div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Section -->
        <main class="main-content">
            <header class="chat-header">
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div class="header-title">OpenClaw Chat</div>
            </header>
            <div class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="welcome-message">
                        <h2>Welcome to OpenClaw AI</h2>
                        <p>Ask me anything or upload a document to get started.</p>
                    </div>
                </div>

                <div class="chat-input-container">
                    <!-- Voice Assistant Banner — visible only when voice is active -->
                    <div id="voice-banner" class="voice-banner hidden">
                        <div class="voice-banner-inner">
                            <div class="voice-waves">
                                <span></span><span></span><span></span><span></span><span></span>
                            </div>
                            <span id="voice-banner-text">Listening...</span>
                            <button id="voice-stop-btn" class="voice-stop-btn" aria-label="Stop voice assistant">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                                </svg>
                                Stop
                            </button>
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="message-input" 
                            class="message-input" 
                            placeholder="Ask OpenClaw..."
                            autocomplete="off"
                        />
                        <!-- Mic: speech-to-text only, fills the input box -->
                        <button id="mic-btn" class="mic-btn" aria-label="Dictate message" title="Dictate — speech to text">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                            </svg>
                        </button>
                        <!-- Voice Assistant: continuous listen → reply → listen loop -->
                        <button id="va-btn" class="va-btn-inline" aria-label="Start voice assistant" title="Voice Assistant — continuously listens and speaks until stopped">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                            </svg>
                        </button>
                        <button id="send-btn" class="send-btn" aria-label="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
